<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Operations</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    color:white;
    cursor:pointer;
    margin-right:5px;
}

.create{background:#28a745;}
.update{background:#007bff;}
.delete{background:#dc3545;}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table, th, td{
    border:1px solid #ddd;
}

th, td{
    padding:10px;
    text-align:left;
}

th{
    background:#007bff;
    color:white;
}
</style>
</head>
<body>

<div class="container">
    <h2>CRUD Operations</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">

    <button class="create" onclick="addUser()">Create</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>
</div>

<script>
let users = [];
let editIndex = -1;

function addUser(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if(name === "" || email === ""){
        alert("Please fill all fields");
        return;
    }

    if(editIndex === -1){
        users.push({name,email});
    }else{
        users[editIndex] = {name,email};
        editIndex = -1;
    }

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";

    displayUsers();
}

function displayUsers(){

    let table = document.getElementById("userTable");
    table.innerHTML = "";

    users.forEach((user,index)=>{

        table.innerHTML += `
        <tr>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>
                <button class="update"
                onclick="editUser(${index})">Edit</button>

                <button class="delete"
                onclick="deleteUser(${index})">Delete</button>
            </td>
        </tr>`;
    });
}

function editUser(index){

    document.getElementById("name").value =
    users[index].name;

    document.getElementById("email").value =
    users[index].email;

    editIndex = index;
}

function deleteUser(index){

    users.splice(index,1);
    displayUsers();
}
</script>

</body>
</html>
